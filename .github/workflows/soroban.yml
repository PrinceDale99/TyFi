name: Soroban CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32v1-none
    - name: Build Contracts
      run: |
        cd contracts/typhoon_resilience_vault
        cargo build --target wasm32v1-none --release
